<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>建築試験対策</title>
</head>
<body>

  <section id="p1">
    <h1>Anki!</h1>
    <button onclick="showPage('p2')">建築史</button>
    <button onclick="showPage('p4')">各部寸法</button>
  </section>

  <section id="p2" hidden>
    <button onclick="showPage('p1')">戻る</button>
    <h1>建築史</h1>

    <img src="images/images.jpg" alt="建築写真" width="300">

    <button>資料</button>
    <button>表示</button>
    <button>前へ</button>
    <button>次へ</button>
  </section>

  <section id="p4" hidden>
    <button onclick="showPage('p1')">戻る</button>
    <h1>各部寸法</h1>

    <p>問題表示エリア</p>

    <button>資料</button>
    <button>表示</button>
    <button>前へ</button>
    <button>次へ</button>
  </section>

  <script>
    function showPage(pageId) {
      document.getElementById("p1").hidden = true;
      document.getElementById("p2").hidden = true;
      document.getElementById("p4").hidden = true;

      document.getElementById(pageId).hidden = false;
    }
  </script>

</body>
</html>
