<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>建築試験対策</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <section id="p1">
    <h1>Anki!</h1>
    <button id="randomButton" onclick="toggleRandomOrder()">ラ</button>
    <div id="categoryButtons"></div>
  </section>

  <section id="p2" hidden>
    <button onclick="showPage('p1')">戻る</button>
    <h1 id="categoryTitle"></h1>

    <p id="questionTitle"></p>
    <img id="questionImage" alt="建築写真" width="300">
    <div id="answerLabels"></div>

    <button>資料</button>
    <button id="answerToggleButton" onclick="toggleAnswer()">答え</button>
    <button onclick="previousQuestion()">前へ</button>
    <button onclick="nextQuestion()">次へ</button>
  </section>

  <script src="papaparse.min.js"></script>
  <script>
    let allQuestions = [];
    let questions = [];
    let currentQuestionIndex = 0;
    let isAnswerVisible = false;
    let isRandomOrder = false;

    async function renderCategoryButtons() {
      const text = await fetch("questions.csv").then(response => response.text());
      allQuestions = Papa.parse(text, {
        header: true,
        skipEmptyLines: true
      }).data.map(row => ({
        ...row,
        answerItems: JSON.parse(row.answerItems)
      }));
      const categories = [...new Set(allQuestions.map(row => row.category))];

      document.getElementById("categoryButtons").innerHTML =
        categories
          .map(category => `
            <button onclick="startCategory('${category}')">
              ${category}
            </button>
          `)
          .join("");
    }

    //問題をシャッフル
    function shuffleQuestions() {
      for (let i = questions.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [questions[i], questions[j]] =
          [questions[j], questions[i]];
      }
    }

    //p1でカテゴリーのボタンが押されたとき、p2に遷移し問題を表示
    function startCategory(category) {
      questions = allQuestions.filter(row => row.category === category);

      if (isRandomOrder){
        shuffleQuestions();
      }

      currentQuestionIndex = 0;
      isAnswerVisible = false;

      document.getElementById("categoryTitle").textContent = category + "（" + questions.length + "）";

      showPage("p2");
      renderQuestion();
    }

    //答えを文字形式にするか写真形式にするか判断する関数
    function createAnswerContent(value) {
      const isImage = value.includes(".jpg");

      if (isImage) {
        return `
          <img
            class="answer-image"
            src="${value}"
            alt="解答画像"
          >
        `;
      }
      return `<span class="answer-text">${value}</span>`;
    }

    //問題を表示する部分、currentQuestionIndexに対応する問題を整形して画面に表示
    function renderQuestion() {
      const question = questions[currentQuestionIndex];
      if (!question) return;

      document.getElementById("questionTitle").textContent = "Q" + (currentQuestionIndex+1)+ " " + question.questionTitle;

      //写真があるなら表示、ないなら非表示
      const imageElement = document.getElementById("questionImage");
      if (question.image) {
        imageElement.src = question.image;
        imageElement.hidden = false;
      } else {
        imageElement.hidden = true;
      }

      document.getElementById("answerLabels").innerHTML =
        question.answerItems
      .map(item => {
        const content = createAnswerContent(item.value);
        const hiddenClass = isAnswerVisible ? "" : "is-hidden";

        return `
          <div class="answer-item">
            <span class="answer-label">
              ${item.label}：
            </span>

            <span class="answer-value ${hiddenClass}">
              ${content}
            </span>
          </div>
        `;
      })
      .join("");

      const toggleButton =
        document.getElementById("answerToggleButton");

      toggleButton.classList.toggle(
        "aria-pressed",
        isAnswerVisible
      );
    }

    function toggleAnswer() {
      isAnswerVisible = !isAnswerVisible;
      renderQuestion();
    }

    function toggleRandomOrder() {
      isRandomOrder = !isRandomOrder;
      randomButton.classList.toggle(
        "aria-pressed",
        isRandomOrder
      );
    }

    function nextQuestion() {
      if (currentQuestionIndex < questions.length - 1) {
        currentQuestionIndex++;
        isAnswerVisible = false;
        renderQuestion();
      }      
    }

    function previousQuestion() {
      if (currentQuestionIndex > 0) {
        currentQuestionIndex--;
        isAnswerVisible = false;
        renderQuestion();
      }

      
    }

    function showPage(pageId) {
      document.getElementById("p1").hidden = true;
      document.getElementById("p2").hidden = true;

      document.getElementById(pageId).hidden = false;
    }

    renderCategoryButtons();
  </script>

</body>
</html>
